version: '3.8'

services:
  llm-service:
    build:
      context: .
      dockerfile: services/Dockerfile
    image: intellifit-ai-service:latest
    container_name: intellifit-llm
    environment:
      - PORT=5300
      - MODEL_NAME=google/flan-t5-base
      - USE_LORA=true
    volumes:
      - .:/app
    ports:
      - "5300:5300"
    command: python services/llm/llm_server.py
    restart: unless-stopped

  embedding-service:
    build:
      context: .
      dockerfile: services/Dockerfile
    image: intellifit-ai-service:latest
    container_name: intellifit-embedding
    environment:
      - PORT=5301
    volumes:
      - .:/app
    ports:
      - "5301:5301"
    command: python services/embedding/embedding_server.py
    restart: unless-stopped

  # Add more services as needed (vision, classification, etc.)
