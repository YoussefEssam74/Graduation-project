# ============================================================
# PulseGym AI Models - Configuration
# Architecture: HYBRID (Rule-Based + RAG + Ollama/Phi-3)
# ============================================================
# 100% FREE, 100% LOCAL - No external API costs
# ============================================================

# ===== Service Ports =====
services:
  embedding_server:
    port: 5001
    host: "0.0.0.0"
  
  analytics_server:
    port: 5005
    host: "0.0.0.0"
  
  workout_generator:
    port: 5010
    host: "0.0.0.0"
  
  nutrition_generator:
    port: 5011
    host: "0.0.0.0"
  
  coach_assistant:
    port: 5012
    host: "0.0.0.0"
  
  whisper_server:
    port: 5003
    host: "0.0.0.0"
    enabled: false
  
  tts_server:
    port: 5004
    host: "0.0.0.0"
    enabled: false

# ===== Database Configuration =====
database:
  connection_env: "DATABASE_URL"
  fallback_connection: "postgresql://postgres:postgres@localhost:5432/pulsegym"
  
  tables:
    exercises: "Exercises"
    meals: "Meals"
    members: "Members"
    workout_plans: "WorkoutPlans"
    nutrition_plans: "NutritionPlans"
    equipment: "Equipment"
    subscriptions: "Subscriptions"

# ===== Embeddings Configuration =====
embeddings:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  dimension: 384
  batch_size: 32
  use_gpu: false

# ===== Vector Store (FAISS) =====
vector_store:
  type: "faiss"
  index_path: "data/faiss_indexes"
  
  indexes:
    exercises:
      path: "data/faiss_indexes/exercises.index"
      metadata_path: "data/faiss_indexes/exercises_metadata.pkl"
    meals:
      path: "data/faiss_indexes/meals.index"
      metadata_path: "data/faiss_indexes/meals_metadata.pkl"
    knowledge_base:
      path: "data/faiss_indexes/knowledge.index"
      metadata_path: "data/faiss_indexes/knowledge_metadata.pkl"
  
  search:
    top_k: 10
    score_threshold: 0.5

# ===== Ollama LLM Configuration (for Coach Assistant) =====
ollama:
  base_url: "http://localhost:11434"
  model: "phi3:mini"
  
  generation:
    max_tokens: 512
    temperature: 0.7
    top_p: 0.9
    repeat_penalty: 1.1
  
  system_prompt: |
    You are an expert fitness coach assistant for PulseGym.
    You provide personalized, evidence-based fitness and nutrition advice.
    CRITICAL: Always acknowledge injuries/medical conditions and recommend consulting healthcare providers.

# ===== Safety Mappings =====
safety:
  injury_mappings_path: "safety/injury_mappings.py"
  allergy_mappings_path: "safety/allergy_mappings.py"
  enforce_hard_filters: true
  log_filtered_items: true

# ===== Workout Generator =====
workout_generator:
  templates_path: "workout_generator/templates"
  default_weeks: 4
  
  progression:
    volume_increase_per_week: 0.05
    intensity_increase_per_week: 0.025
  
  exercises_per_day:
    beginner: 4
    intermediate: 5
    advanced: 6
  
  sets_reps:
    strength: { sets: 5, reps: [3, 5] }
    hypertrophy: { sets: 4, reps: [8, 12] }
    endurance: { sets: 3, reps: [15, 20] }
    weight_loss: { sets: 3, reps: [12, 15] }

# ===== Nutrition Generator =====
nutrition_generator:
  templates_path: "nutrition_generator/templates"
  meals_per_day: 5
  bmr_formula: "mifflin_st_jeor"
  
  activity_multipliers:
    sedentary: 1.2
    light: 1.375
    moderate: 1.55
    active: 1.725
    very_active: 1.9
  
  macro_splits:
    weight_loss: { protein: 0.40, carbs: 0.30, fat: 0.30, calorie_adjustment: -500 }
    muscle_gain: { protein: 0.30, carbs: 0.45, fat: 0.25, calorie_adjustment: 400 }
    maintenance: { protein: 0.30, carbs: 0.40, fat: 0.30, calorie_adjustment: 0 }
    athletic_performance: { protein: 0.25, carbs: 0.50, fat: 0.25, calorie_adjustment: 300 }

# ===== Coach Assistant =====
coach_assistant:
  max_history_messages: 10
  rag:
    enabled: true
    top_k: 5
    include_user_profile: true

# ===== Analytics Engine =====
analytics:
  data_paths:
    equipment_usage: "data/equipment_usage.csv"
    monthly_revenue: "data/monthly_revenue.csv"
    member_activity: "data/member_activity.csv"
  
  equipment:
    usage_threshold_high: 0.8
    usage_threshold_low: 0.2
    maintenance_warning_days: 30
  
  revenue:
    forecast_periods: 12
    seasonality_mode: "multiplicative"
  
  churn:
    model_type: "random_forest"
    risk_threshold: 0.7

# ===== Logging =====
logging:
  level: "INFO"
  paths:
    general: "logs/ml_services.log"
    errors: "logs/errors.log"

# ===== Development Settings =====
development:
  debug_mode: true
  mock_database: false
