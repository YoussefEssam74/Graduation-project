# ============================================================================
# render.yaml — Infrastructure as Code for Render
# ============================================================================
# This file lets Render auto-discover your service configuration.
# Deploy: Push to GitHub → Render Dashboard → New → Blueprint → Connect repo
# ============================================================================

services:
  - type: web
    name: intellifit-api
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    region: frankfurt         # Closest to Egypt
    plan: free
    healthCheckPath: /swagger/index.html  # Swagger is enabled in all environments
    envVars:
      # ── ASP.NET ──
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: PORT
        value: "10000"
      # ── Database (Neon PostgreSQL — pooled URL) ──
      - key: ConnectionStrings__DefaultConnection
        sync: false          # Set manually in Render dashboard
      # ── JWT ──
      - key: Jwt__Key
        sync: false          # Set manually — must be 32+ chars
      - key: Jwt__Issuer
        value: IntelliFit
      - key: Jwt__Audience
        value: IntelliFitUsers
      - key: Jwt__ExpirationDays
        value: "7"
      - key: Jwt__ClockSkewMinutes
        value: "0"
      # ── Groq (for AI Coach Chat) ──
      - key: Groq__ApiKey
        sync: false
      # ── ML Services ──
      - key: MLService__BaseUrl
        value: https://youssefeemad-workout-generator.hf.space
      - key: MLService__NutritionBaseUrl
        value: https://youssefemaad--intellifit-nutrition-nutritionservice-web.modal.run
      - key: MLService__TimeoutSeconds
        value: "360"
      # ── Workout Generator API ──
      - key: WorkoutGeneratorAPI__BaseUrl
        value: https://youssefeemad-workout-generator.hf.space
      - key: WorkoutGeneratorAPI__TimeoutSeconds
        value: "360"
      # ── Embedding Service ──
      - key: EmbeddingService__BaseUrl
        value: http://localhost:5100
      # ── Security / CORS ──
      - key: Security__RequireHttps
        value: "true"
      - key: Security__AllowedOrigins__0
        sync: false          # Set to your Vercel frontend URL after deployment
      - key: Security__AllowedOrigins__1
        value: http://localhost:3000
      - key: Security__AllowedOrigins__2
        value: http://localhost:3001
      # ── Email (SMTP) ──
      - key: Email__SmtpHost
        value: smtp.gmail.com
      - key: Email__SmtpPort
        value: "587"
      - key: Email__SmtpUser
        sync: false
      - key: Email__SmtpPass
        sync: false
      - key: Email__FromAddress
        sync: false
      - key: Email__FromName
        value: PulseGym
      # ── Google OAuth ──
      - key: Google__ClientId
        value: 1083535101116-p4iirka9e60m4nklv8rbr2r0s2ji2ape.apps.googleusercontent.com
